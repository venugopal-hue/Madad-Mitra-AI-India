<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madad Mitra AI | Choose Your Role</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            overflow-x: hidden;
            overflow-y: auto;
            font-family: 'Inter', sans-serif;
            background: #000;
        }

        .split-container {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        .split {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            cursor: default;
        }

        .split::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.2;
            z-index: -1;
            transition: transform 0.8s ease;
        }

        .volunteer-side::before {
            background-image: url('https://images.unsplash.com/photo-1593113598332-cd288d649433?auto=format&fit=crop&q=80');
        }

        .ngo-side::before {
            background-image: url('https://images.unsplash.com/photo-1532629345422-7515f3d16bb8?auto=format&fit=crop&q=80');
        }

        .split:hover {
            flex: 1;
        }

        .split:hover::before {
            transform: scale(1.1);
            opacity: 0.4;
        }

        .volunteer-side {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.3), rgba(0, 0, 0, 0.85));
            border-right: 1px solid var(--glass-border);
            overflow: hidden;
        }

        /* Radar Animation */
        .radar-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            z-index: 1;
            opacity: 0.3;
            pointer-events: none;
        }

        .radar-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 50%;
            animation: radarPulse 4s infinite linear;
        }

        .radar-ring:nth-child(2) {
            animation-delay: 1s;
        }

        .radar-ring:nth-child(3) {
            animation-delay: 2s;
        }

        .radar-ring:nth-child(4) {
            animation-delay: 3s;
        }

        @keyframes radarPulse {
            0% {
                width: 0;
                height: 0;
                opacity: 1;
            }

            100% {
                width: 100%;
                height: 100%;
                opacity: 0;
            }
        }

        .radar-sweep {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300px;
            height: 300px;
            background: conic-gradient(from 0deg, rgba(16, 185, 129, 0.4) 0deg, transparent 90deg);
            border-radius: 50%;
            transform-origin: top left;
            animation: radarSweep 4s infinite linear;
            z-index: 1;
        }

        @keyframes radarSweep {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .ngo-side {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(0, 0, 0, 0.95));
        }

        .content {
            z-index: 10;
            width: 100%;
            max-width: 420px;
            min-height: auto;
            animation: fadeIn 0.8s ease;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            padding: 30px;
            border-radius: var(--radius-lg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .icon-circle {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            background: rgba(16, 185, 129, 0.1);
            border: 2px solid rgba(16, 185, 129, 0.3);
            margin-left: auto;
            margin-right: auto;
            position: relative;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }

        .icon-badge {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #10b981;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #000;
            font-size: 0.7rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        .btn-choice {
            flex: 1;
            padding: 14px;
            border-radius: var(--radius-sm);
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-login {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: white;
        }

        .btn-login:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--primary);
        }

        .btn-signup {
            background: var(--primary);
            color: white;
            border: 1px solid var(--primary);
        }

        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .logo-top {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 99px;
            border: 1px solid var(--glass-border);
        }

        @media (max-width: 768px) {
            body, html {
                overflow: hidden;
                height: 100%;
            }

            .split-container {
                flex-direction: column;
                height: 100vh;
                min-height: 100vh;
                overflow: hidden;
            }

            .split {
                flex: 1;
                min-height: 0;
                height: 50vh;
                padding: 0 16px;
                justify-content: center;
                overflow: hidden;
            }

            .logo-top {
                top: 10px;
                padding: 7px 14px;
                font-size: 0.78rem;
            }

            .content {
                padding: 14px 16px;
                width: 100%;
                max-width: 100%;
                background: rgba(0, 0, 0, 0.35) !important;
            }

            .icon-circle {
                width: 44px;
                height: 44px;
                margin-bottom: 6px;
            }

            h1 {
                font-size: 1.15rem;
                margin-bottom: 4px;
            }

            p {
                font-size: 0.76rem;
                margin-bottom: 10px;
                line-height: 1.4;
            }

            .btn-group {
                gap: 8px;
            }

            .btn-choice {
                padding: 9px 10px;
                font-size: 0.68rem;
            }

            .volunteer-side {
                border-bottom: 1px solid rgba(255,255,255,0.1);
            }

            .radar-container {
                width: 110px;
                height: 110px;
                opacity: 0.07;
            }

            .form-group {
                margin-bottom: 8px;
            }

            .form-group input {
                padding: 8px 12px;
                font-size: 0.82rem;
            }

            .back-btn {
                margin-bottom: 8px;
                font-size: 0.8rem;
            }
        }


        .auth-form {
            display: none;
            width: min(100%, 390px);
            animation: fadeIn 0.5s ease;
            text-align: left;
            min-height: auto;
            padding: 22px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 9px 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            color: white;
            font-size: 0.85rem;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 20px;
        }

        .back-btn:hover {
            color: white;
        }
    </style>
</head>

<body>
    <canvas id="networkCanvas"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none;"></canvas>

    <div class="logo-top">
        <i data-lucide="shield-plus" style="color: var(--primary); width: 24px; height: 24px;"></i>
        <span style="font-weight: 800; letter-spacing: 3px; font-size: 0.9rem; color: #fff;">MADAD MITRA AI</span>
    </div>

    <div class="split-container">
        <!-- Volunteer Side -->
        <div class="split volunteer-side" id="volunteer-section">
            <div class="content" id="volunteer-content">
                <div class="icon-circle">
                    <i data-lucide="user-round-plus" size="40" style="color: #10b981;"></i>
                </div>
                <h1 style="color: #10b981;">I am a Volunteer</h1>
                <p>Join the frontline of community support. Help nearby neighbors and respond to emergencies.</p>
                <div class="btn-group">
                    <button onclick="showAuth('volunteer', 'login')" class="btn-choice btn-login">Login</button>
                    <button onclick="showAuth('volunteer', 'signup')" class="btn-choice btn-signup"
                        style="background: #10b981; border-color: #10b981;">Sign Up</button>
                </div>
            </div>

            <!-- Volunteer Auth Form -->
            <div class="content auth-form" id="volunteer-auth">
                <button class="back-btn" onclick="hideAuth('volunteer')"><i data-lucide="arrow-left"></i> Back</button>
                <h2 id="volunteer-auth-title" style="margin-bottom: 20px; color: #10b981;">Login</h2>
                <form id="volunteer-form">
                    <div class="form-group" id="volunteer-name-group" style="display: none;">
                        <label>Full Name</label>
                        <input type="text" id="volunteer-name" placeholder="Enter your name">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="volunteer-email" placeholder="email@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="volunteer-password" placeholder="********" required>
                    </div>
                    <button type="submit" class="btn btn-primary"
                        style="width: 100%; background: #10b981; border-color: #10b981;"
                        id="volunteer-submit-btn">Login</button>
                </form>
            </div>
        </div>

        <!-- NGO Side -->
        <div class="split ngo-side" id="ngo-section">
            <div class="content" id="ngo-content">
                <div class="icon-circle" style="background: rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.3); box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);">
                    <i data-lucide="building-2" size="40" style="color: #3b82f6;"></i>
                </div>
                <h1 style="color: #3b82f6;">I am an NGO</h1>
                <p>Scale your organization's reach. Post missions, coordinate volunteers, and manage community relief in real-time.</p>
                <div class="btn-group">
                    <button onclick="showAuth('ngo', 'login')" class="btn-choice btn-login">Login</button>
                    <button onclick="showAuth('ngo', 'signup')" class="btn-choice btn-signup">Sign Up</button>
                </div>
            </div>

            <!-- NGO Auth Form -->
            <div class="content auth-form" id="ngo-auth">
                <button class="back-btn" onclick="hideAuth('ngo')"><i data-lucide="arrow-left"></i> Back</button>
                <h2 id="ngo-auth-title" style="margin-bottom: 20px; color: #3b82f6;">Login</h2>
                <form id="ngo-form">
                    <div class="form-group" id="ngo-name-group" style="display: none;">
                        <label>NGO Name</label>
                        <input type="text" id="ngo-name" placeholder="Enter NGO name">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="ngo-email" placeholder="ngo@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="ngo-password" placeholder="********" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;"
                        id="ngo-submit-btn">Login</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from "./js/config.js";
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        lucide.createIcons();

        // Auth Navigation
        window.showAuth = (role, mode) => {
            const content = document.getElementById(`${role}-content`);
            const authDiv = document.getElementById(`${role}-auth`);
            const title = document.getElementById(`${role}-auth-title`);
            const nameGroup = document.getElementById(`${role}-name-group`);
            const submitBtn = document.getElementById(`${role}-submit-btn`);
            const nameInput = document.getElementById(`${role}-name`);

            content.style.display = 'none';
            authDiv.style.display = 'block';
            title.textContent = mode === 'login' ? 'Login' : 'Sign Up';
            nameGroup.style.display = mode === 'login' ? 'none' : 'block';
            submitBtn.textContent = mode === 'login' ? 'Login' : 'Create Account';
            if (nameInput) nameInput.required = mode === 'signup';
            authDiv.dataset.mode = mode;
        };

        window.hideAuth = (role) => {
            document.getElementById(`${role}-content`).style.display = 'block';
            document.getElementById(`${role}-auth`).style.display = 'none';
        };

        // Form Handlers
        const handleAuth = async (role, e) => {
            e.preventDefault();
            const mode = document.getElementById(`${role}-auth`).dataset.mode || 'login';
            const email = document.getElementById(`${role}-email`).value;
            const password = document.getElementById(`${role}-password`).value;
            const name = document.getElementById(`${role}-name`)?.value;

            try {
                if (mode === 'login') {
                    await signInWithEmailAndPassword(auth, email, password);
                    const userDoc = await getDoc(doc(db, "users", auth.currentUser.uid));
                    window.location.href = userDoc.data().role === 'ngo' ? 'ngo-dashboard.html' : 'volunteer-dashboard.html';
                } else {
                    const res = await createUserWithEmailAndPassword(auth, email, password);
                    await setDoc(doc(db, "users", res.user.uid), {
                        name, email, role,
                        created_at: new Date().toISOString(),
                        availability: 'online'
                    });
                    window.location.href = role === 'ngo' ? 'ngo-dashboard.html' : 'volunteer-dashboard.html';
                }
            } catch (err) { alert(err.message); }
        };

        document.getElementById('volunteer-form').onsubmit = (e) => handleAuth('volunteer', e);
        document.getElementById('ngo-form').onsubmit = (e) => handleAuth('ngo', e);

        // Vibrant Neural Network Animation
        const canvas = document.getElementById('networkCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const particleCount = 80;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.radius = Math.random() * 3 + 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }

            draw() {
                const isVolunteerSide = this.x < canvas.width / 2;
                const color = isVolunteerSide ? '16, 185, 129' : '59, 130, 246';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${color}, 0.8)`; // High Visibility
                ctx.fill();
            }
        }

        for (let i = 0; i < particleCount; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 180) {
                        const isVolunteerSide = particles[i].x < canvas.width / 2;
                        const color = isVolunteerSide ? '16, 185, 129' : '59, 130, 246';
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(${color}, ${0.5 * (1 - dist / 180)})`; // High Visibility Lines
                        ctx.lineWidth = 1.2;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>




</body>

</html>
